<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CMS OKO TRAVELS - Login</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-container {
      background: white;
      border-radius: 15px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      overflow: hidden;
      max-width: 500px;
      width: 100%;
      animation: slideUp 0.6s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .login-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 40px 30px;
      text-align: center;
    }

    .login-header h1 {
      font-size: 28px;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .login-header p {
      font-size: 14px;
      opacity: 0.9;
    }

    .login-form {
      padding: 40px 30px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 600;
      font-size: 14px;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      transition: all 0.3s ease;
      font-family: inherit;
    }

    input[type="email"]:focus,
    input[type="password"]:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .form-group.checkbox-group {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
    }

    .form-group.checkbox-group label {
      margin-bottom: 0;
      display: flex;
      align-items: center;
      font-weight: 500;
    }

    .form-group.checkbox-group input[type="checkbox"] {
      margin-right: 6px;
      width: 16px;
      height: 16px;
      cursor: pointer;
    }

    .forgot-password {
      color: #667eea;
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .forgot-password:hover {
      color: #764ba2;
      text-decoration: underline;
    }

    .btn-login {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .alert {
      padding: 12px 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
      animation: slideDown 0.3s ease-out;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .alert.show {
      display: block;
    }

    .alert.success {
      background-color: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .alert.error {
      background-color: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .alert.info {
      background-color: #d1ecf1;
      color: #0c5460;
      border: 1px solid #bee5eb;
    }

    .loading-spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .demo-credentials {
      background-color: #f0f4ff;
      border-left: 4px solid #667eea;
      padding: 15px;
      border-radius: 8px;
      margin-top: 20px;
      font-size: 13px;
      color: #555;
    }

    .demo-credentials p {
      margin: 5px 0;
      font-family: 'Monaco', 'Courier New', monospace;
    }

    .demo-credentials strong {
      color: #333;
    }

    /* Responsive Design */
    @media (max-width: 480px) {
      .login-container {
        border-radius: 8px;
      }

      .login-header {
        padding: 30px 20px;
      }

      .login-header h1 {
        font-size: 24px;
      }

      .login-form {
        padding: 30px 20px;
      }

      .form-group.checkbox-group {
        flex-direction: column;
        align-items: flex-start;
      }

      .forgot-password {
        display: block;
        margin-top: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <h1><i class="fas fa-globe"></i> OKO TRAVELS</h1>
      <p>Panel Administrador</p>
    </div>

    <div class="login-form">
      <div class="alert" id="alertBox"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email"><i class="fas fa-envelope"></i> Email</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="admin@example.com"
            required
            autocomplete="email"
          >
        </div>

        <div class="form-group">
          <label for="password"><i class="fas fa-lock"></i> Contraseña</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Tu contraseña segura"
            required
            autocomplete="current-password"
          >
        </div>

        <div class="form-group checkbox-group">
          <label>
            <input type="checkbox" id="rememberMe" name="rememberMe">
            Recuerda mis datos
          </label>
          <a href="#" class="forgot-password">¿Olvidaste contraseña?</a>
        </div>

        <button type="submit" class="btn-login" id="loginBtn">
          Iniciar Sesión
        </button>
      </form>

      <div class="demo-credentials">
        <strong>📝 Para pruebas:</strong>
        <p><strong>Email:</strong> admin@oko.com</p>
        <p><strong>Contraseña:</strong> Admin123!</p>
      </div>
    </div>
  </div>

  <script>
    const API_URL = localStorage.getItem('apiUrl') || 'http://localhost:5000';
    const loginForm = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const loginBtn = document.getElementById('loginBtn');
    const alertBox = document.getElementById('alertBox');
    const rememberMe = document.getElementById('rememberMe');

    // Cargar datos guardados si existen
    window.addEventListener('DOMContentLoaded', () => {
      const savedEmail = localStorage.getItem('savedEmail');
      if (savedEmail) {
        emailInput.value = savedEmail;
        rememberMe.checked = true;
      }
    });

    // Mostrar alerta
    function showAlert(message, type = 'info') {
      alertBox.textContent = message;
      alertBox.className = `alert show ${type}`;
      setTimeout(() => {
        alertBox.classList.remove('show');
      }, 5000);
    }

    // Validación del formulario
    function validateForm() {
      if (!emailInput.value.trim()) {
        showAlert('Por favor ingresa tu email', 'error');
        emailInput.focus();
        return false;
      }

      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailInput.value)) {
        showAlert('Por favor ingresa un email válido', 'error');
        emailInput.focus();
        return false;
      }

      if (!passwordInput.value.trim()) {
        showAlert('Por favor ingresa tu contraseña', 'error');
        passwordInput.focus();
        return false;
      }

      if (passwordInput.value.length < 6) {
        showAlert('La contraseña debe tener al menos 6 caracteres', 'error');
        return false;
      }

      return true;
    }

    // Manejar envío del formulario
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      if (!validateForm()) return;

      // Deshabilitar botón y mostrar carga
      loginBtn.disabled = true;
      loginBtn.innerHTML = '<span class="loading-spinner"></span>Verificando...';

      try {
        const response = await fetch(`${API_URL}/api/auth/login`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            email: emailInput.value,
            password: passwordInput.value
          })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Error al iniciar sesión');
        }

        // Guardar token y datos del usuario
        localStorage.setItem('authToken', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        localStorage.setItem('apiUrl', API_URL);

        // Guardar email si está marcado "Recuerda"
        if (rememberMe.checked) {
          localStorage.setItem('savedEmail', emailInput.value);
        } else {
          localStorage.removeItem('savedEmail');
        }

        showAlert('✅ Sesión iniciada correctamente', 'success');

        // Redirigir al dashboard después de 1 segundo
        setTimeout(() => {
          window.location.href = './index.html';
        }, 1000);

      } catch (error) {
        console.error('Error:', error);
        showAlert(`❌ ${error.message}`, 'error');
        loginBtn.disabled = false;
        loginBtn.innerHTML = 'Iniciar Sesión';
      }
    });

    // Permitir login con Enter
    passwordInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        loginForm.dispatchEvent(new Event('submit'));
      }
    });

    // Redirigir si ya tiene sesión activa
    const token = localStorage.getItem('authToken');
    if (token) {
      window.location.href = './index.html';
    }
  </script>
</body>
</html>
